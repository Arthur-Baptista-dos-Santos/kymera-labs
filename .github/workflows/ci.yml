name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  testes:
    name: Testes e Qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Gerar dados sinteticos
        run: python dados/gerar_dados.py

      - name: Treinar modelos
        run: python -m backend.ml.treinar

      - name: Executar testes
        run: pytest tests/ -v --tb=short

      - name: Verificar formatacao com ruff
        run: |
          pip install ruff
          ruff check backend/ tests/ --ignore E501
        continue-on-error: true
